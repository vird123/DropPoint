<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DropPoint</title>
</head>

<body style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto',
        'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans',
        'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    ">
  <div style="
        -webkit-app-region: drag;
        border-radius: 0.5rem;
        width: 100%;
        height: 100%;
        background-color: var(--bg-color);
        backdrop-filter: blur(20px) saturate(125%);
        transition: background-color 0.3s ease;
        border: 1px solid var(--accent-border-color);
        box-sizing: border-box;
      ">
    <div class="close" title="Clear">&#215;</div>
    <div id="droppoint">
      <div class="upload">
        <img src="./media/upload.png" alt="Upload Here" style="opacity: 0.8; pointer-events: none" />
        Drop Your File(s) Here
      </div>
      <div id="drag">
        <div class="file-icon">
          <img src="" />
          <img src="" />
          <img src="" />
        </div>
        Drag Your <num></num> File(s) Out
      </div>
    </div>
  </div>
</body>
<style>
  :root {
    /* Catppuccin Latte (Light theme) */
    --bg-color: rgba(239, 241, 245, 1); /* base */
    --bg-blur: rgba(239, 241, 245, 0.9);
    --text-color: #4c4f69; /* text */
    --text-color-light: rgba(76, 79, 105, 0.7);
    --close-bg: #d20f39; /* red */
    --close-text: #eff1f5;
    --border-color: #ccd0da; /* surface0 */
    --accent-border-color: #8839ef; /* mauve */
    --shadow-color: rgba(76, 79, 105, 0.17);
    --shadow-color-light: rgba(76, 79, 105, 0.07);
  }

  .dark {
    /* Catppuccin Frappe (Dark theme) */
    --bg-color: rgba(48, 52, 70, 1); /* base */
    --bg-blur: rgba(48, 52, 70, 0.9);
    --text-color: #c6d0f5; /* text */
    --text-color-light: rgba(198, 208, 245, 0.7);
    --close-bg: #e78284; /* red */
    --close-text: #303446;
    --border-color: #626880; /* surface2 */
    --accent-border-color: #ca9ee6; /* mauve */
    --shadow-color: rgba(35, 38, 52, 0.5);
    --shadow-color-light: rgba(35, 38, 52, 0.3);
  }

  * {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
  }

  /* Tilt animation keyframes for multiple files */
  @keyframes tilt {
    from {
      transform: rotate(0deg);
    }

    to {
      transform: rotate(25deg);
      transform-origin: bottom;
    }
  }

  @keyframes tiltmore {
    from {
      transform: rotate(0deg);
    }

    to {
      transform: rotate(50deg);
      transform-origin: bottom;
    }
  }

  html {
    top: 0;
    left: 0;
    width: fit-content;
    height: fit-content;
  }

  body {
    width: 100vw;
    height: 100vh;
    transition: all 0.3s ease;
  }

  .close {
    width: 1rem;
    height: 1rem;
    font-size: 0.8rem;
    display: flex;
    background-color: var(--close-bg);
    color: var(--close-text);
    align-items: center;
    justify-content: center;
    position: absolute;
    right: 5%;
    top: 5%;
    border-radius: 2rem;
    z-index: 10;
    cursor: pointer;
    user-select: none;
    -webkit-app-region: no-drag;
    transition: all 0.3s ease;
  }

  @keyframes dragged {
    from {
      border-radius: 100px;
      border: 2px dashed transparent;
    }

    to {
      border-radius: 6px;
      border: 2px dashed var(--border-color);
    }
  }

  .dragged {
    cursor: grabbing;
    animation: dragged 0.5s forwards;
    /* transition: all 0.25s ease-in-out; */
  }

  #droppoint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-55%, -55%);
    width: 140px;
    height: 140px;
    margin: 8px;
    color: var(--text-color);
    user-select: none;
    border: 2px transparent solid;
    -webkit-app-region: no-drag;
    transition: all 0.5s ease-in-out;
  }

  .upload {
    width: 100%;
    height: 100%;
    display: flex;
    text-align: center;
    flex-direction: column;
    font-family: sans-serif;
    user-select: none;
    align-items: center;
    justify-content: center;
  }

  img {
    max-width: 60px;
    padding: 8px;
  }

  #drag {
    height: 100%;
    width: 100%;
    display: none;
    text-align: center;
    flex-direction: column;
    font-family: sans-serif;
    align-items: center;
    justify-content: center;
  }

  .file-icon {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .file-icon img {
    position: absolute;
    /* box-shadow: 2px 2px 20px var(--shadow-color-light); */
    filter: drop-shadow(2px 2px 4px var(--shadow-color));
    transition: filter 0.3s ease;
  }

  .file-icon img:nth-child(1) {
    z-index: 3;
  }

  .file-icon img:nth-child(2) {
    z-index: 2;
    animation: tilt 0.25s ease forwards;
    /* transform: translate(10px) rotate(15deg); */
  }

  .file-icon img:nth-child(3) {
    z-index: 1;
    animation: tiltmore 0.25s ease forwards;
    /* transform: translate(20px) rotate(30deg); */
  }
</style>
<script src="../renderer/droppoint.js"></script>

</html>
